<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote System Manager</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
            --success: #3fb950;
            --warning: #d2991d;
            --input-bg: #0d1117;
            --scrollbar-thumb: #30363d;
            --scrollbar-track: #161b22;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --radius: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Login overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13,17,23,0.97);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #login-box h2 {
            margin-bottom: 1.2rem;
            color: var(--accent);
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        #login-box input {
            width: 100%;
            padding: 0.65rem 0.8rem;
            margin-bottom: 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #login-box input:focus {
            border-color: var(--accent);
        }

        #login-box button {
            width: 100%;
            padding: 0.65rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        #login-box button:hover {
            background: #4090e0;
        }

        #login-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 0.8rem;
            display: none;
            text-align: center;
        }

        /* Main layout */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header .title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 0.3px;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.3rem 0.6rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .tab {
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s;
            user-select: none;
        }

        .tab:hover {
            background: #1c2129;
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: #1a2028;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .panel {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 1rem;
        }

        .panel.active {
            display: flex;
        }

        /* Terminal */
        #terminal-output {
            flex: 1;
            background: #0a0e14;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 200px;
            color: #d2d2d2;
            line-height: 1.5;
        }

        .terminal-input-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        #terminal-cmd {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .quick-cmds {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .quick-cmd {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        .quick-cmd:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* File Manager */
        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.3rem;
            background: var(--surface);
            padding: 0.5rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.8rem;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .breadcrumb span {
            cursor: pointer;
            color: var(--accent);
            padding: 0.15rem 0.35rem;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .breadcrumb span:hover {
            background: #1f2a3a;
        }

        .breadcrumb .sep {
            color: var(--text-secondary);
            pointer-events: none;
        }

        #file-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-y: auto;
            flex: 1;
            min-height: 200px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.55rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.9rem;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #1c2129;
        }

        .file-item .name {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .file-icon {
            font-size: 1.1rem;
            width: 1.5rem;
            text-align: center;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .file-act-btn {
            background: var(--border);
            border: none;
            color: var(--text-secondary);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .file-act-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .file-act-btn.delete:hover {
            background: var(--danger);
        }

        /* Upload */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            background: var(--surface);
            transition: border-color 0.2s;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            min-height: 250px;
        }

        .upload-zone.dragover {
            border-color: var(--accent);
            background: #1a2634;
        }

        #upload-path {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.5rem 0.8rem;
            color: var(--text);
            width: 100%;
            max-width: 400px;
            font-family: monospace;
        }

        .progress-container {
            width: 100%;
            max-width: 400px;
            background: var(--border);
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            display: none;
        }

        #progress-bar {
            height: 100%;
            width: 0;
            background: var(--success);
            transition: width 0.2s;
        }

        /* Editor */
        .editor-header {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            align-items: center;
        }

        #editor-filename {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.5rem 0.8rem;
            color: var(--text);
            font-family: monospace;
            font-size: 0.9rem;
        }

        #editor-content {
            flex: 1;
            background: #0a0e14;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            color: var(--text);
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.85rem;
            resize: none;
            min-height: 200px;
        }

        /* Settings modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal-content h3 {
            color: var(--accent);
            font-weight: 500;
        }

        .modal-content input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            border-radius: var(--radius);
            font-family: monospace;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .loader {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay">
        <div id="login-box">
            <h2>Authentication</h2>
            <input type="password" id="password-input" placeholder="Enter password" autofocus>
            <button id="login-btn">Connect</button>
            <div id="login-error">Invalid password</div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Connection Settings</h3>
            <label>Backend URL</label>
            <input type="text" id="backend-url" placeholder="https://example.com/api.php">
            <label>Password</label>
            <input type="text" id="backend-password" placeholder="your password">
            <div class="modal-actions">
                <button class="btn" id="cancel-settings">Cancel</button>
                <button class="btn primary" id="save-settings">Save</button>
            </div>
        </div>
    </div>

    <header>
        <span class="title">⚡ Remote System Manager</span>
        <div class="header-actions">
            <button class="icon-btn" id="settings-btn" title="Settings">⚙️ Settings</button>
            <button class="icon-btn" id="logout-btn" title="Lock">🔒 Lock</button>
        </div>
    </header>

    <nav>
        <div class="tab active" data-panel="terminal">💻 Terminal</div>
        <div class="tab" data-panel="files">📁 File Manager</div>
        <div class="tab" data-panel="upload">⬆️ Upload</div>
        <div class="tab" data-panel="editor">📝 Editor</div>
    </nav>

    <main>
        <!-- Terminal Panel -->
        <div id="panel-terminal" class="panel active">
            <div id="terminal-output"></div>
            <div class="quick-cmds">
                <span class="quick-cmd">ls</span>
                <span class="quick-cmd">pwd</span>
                <span class="quick-cmd">whoami</span>
                <span class="quick-cmd">id</span>
                <span class="quick-cmd">uname -a</span>
                <span class="quick-cmd">cd ..</span>
                <span class="quick-cmd">ps aux</span>
                <span class="quick-cmd">netstat -tulpn</span>
            </div>
            <div class="terminal-input-row">
                <input type="text" id="terminal-cmd" placeholder="Type command..." autofocus>
                <button class="btn primary" id="terminal-exec">Execute</button>
            </div>
        </div>

        <!-- File Manager Panel -->
        <div id="panel-files" class="panel">
            <div class="breadcrumb" id="breadcrumb"></div>
            <div id="file-list"></div>
        </div>

        <!-- Upload Panel -->
        <div id="panel-upload" class="panel">
            <div class="upload-zone" id="upload-zone">
                <div>📤 Drop files here or click to select</div>
                <input type="text" id="upload-path" placeholder="Destination path (e.g., /var/www/uploads/)" value="/tmp/">
                <input type="file" id="file-input" style="display:none" multiple>
                <button class="btn primary" id="select-files-btn">Select Files</button>
                <div class="progress-container" id="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="upload-status"></div>
            </div>
        </div>

        <!-- Editor Panel -->
        <div id="panel-editor" class="panel">
            <div class="editor-header">
                <input type="text" id="editor-filename" placeholder="File path to edit">
                <button class="btn primary" id="editor-load">Load</button>
                <button class="btn" id="editor-save">Save</button>
                <span id="editor-status"></span>
            </div>
            <textarea id="editor-content" placeholder="File content will appear here..."></textarea>
        </div>
    </main>

    <script>
    (function() {
        // ====== CONFIGURATION ======
        // Change these defaults or use the settings gear in the UI
        let BACKEND_URL = 'api.php';
        let AUTH_PASSWORD = '123456';
        let sessionActive = false;

        // ====== DOM ELEMENTS ======
        const loginOverlay = document.getElementById('login-overlay');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const settingsModal = document.getElementById('settings-modal');
        const backendUrlInput = document.getElementById('backend-url');
        const backendPasswordInput = document.getElementById('backend-password');
        const settingsBtn = document.getElementById('settings-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const cancelSettings = document.getElementById('cancel-settings');
        const saveSettings = document.getElementById('save-settings');
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.panel');
        const terminalOutput = document.getElementById('terminal-output');
        const terminalCmd = document.getElementById('terminal-cmd');
        const terminalExec = document.getElementById('terminal-exec');
        const quickCmds = document.querySelectorAll('.quick-cmd');
        const breadcrumb = document.getElementById('breadcrumb');
        const fileList = document.getElementById('file-list');
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const selectFilesBtn = document.getElementById('select-files-btn');
        const uploadPath = document.getElementById('upload-path');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const uploadStatus = document.getElementById('upload-status');
        const editorFilename = document.getElementById('editor-filename');
        const editorContent = document.getElementById('editor-content');
        const editorLoad = document.getElementById('editor-load');
        const editorSave = document.getElementById('editor-save');
        const editorStatus = document.getElementById('editor-status');

        let currentPath = '/';

        // ====== UTILITIES ======
        function apiUrl(params = {}) {
            const url = new URL(BACKEND_URL, window.location.origin);
            url.searchParams.set('password', AUTH_PASSWORD);
            for (const [key, val] of Object.entries(params)) {
                url.searchParams.set(key, val);
            }
            return url.toString();
        }

        async function apiCall(params, method = 'GET', body = null) {
            const url = apiUrl(params);
            const options = { method };
            if (body) {
                options.body = body;
                // Don't set Content-Type for FormData, browser does it
            }
            const response = await fetch(url, options);
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                return response.json();
            } else {
                return response.text();
            }
        }

        function appendTerminal(text) {
            terminalOutput.textContent += text;
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        // ====== LOGIN ======
        loginBtn.addEventListener('click', async () => {
            const pwd = passwordInput.value.trim();
            if (!pwd) return;
            AUTH_PASSWORD = pwd;
            try {
                // Test connection with a simple command
                await apiCall({ action: 'cmd', cmd: 'echo OK' });
                sessionActive = true;
                loginOverlay.style.display = 'none';
                appendTerminal('Connected. Session active.\n');
                loadFileList(currentPath);
            } catch (e) {
                loginError.style.display = 'block';
                loginError.textContent = 'Connection failed: ' + e.message;
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            sessionActive = false;
            loginOverlay.style.display = 'flex';
            passwordInput.value = '';
            terminalOutput.textContent = '';
            passwordInput.focus();
        });

        // ====== SETTINGS ======
        settingsBtn.addEventListener('click', () => {
            backendUrlInput.value = BACKEND_URL;
            backendPasswordInput.value = AUTH_PASSWORD;
            settingsModal.style.display = 'flex';
        });

        cancelSettings.addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        saveSettings.addEventListener('click', () => {
            const newUrl = backendUrlInput.value.trim();
            const newPwd = backendPasswordInput.value.trim();
            if (newUrl) BACKEND_URL = newUrl;
            if (newPwd) AUTH_PASSWORD = newPwd;
            settingsModal.style.display = 'none';
            // Optionally re-test connection
            if (sessionActive) {
                apiCall({ action: 'cmd', cmd: 'echo reconfigured' })
                    .then(() => appendTerminal('Settings updated.\n'))
                    .catch(e => appendTerminal('Settings saved but test failed: ' + e.message + '\n'));
            }
        });

        window.addEventListener('click', (e) => {
            if (e.target === settingsModal) settingsModal.style.display = 'none';
        });

        // ====== TAB NAVIGATION ======
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const panelId = tab.dataset.panel;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panels.forEach(p => p.classList.remove('active'));
                document.getElementById(`panel-${panelId}`).classList.add('active');
                if (panelId === 'files') loadFileList(currentPath);
            });
        });

        // ====== TERMINAL ======
        terminalExec.addEventListener('click', async () => {
            const cmd = terminalCmd.value.trim();
            if (!cmd) return;
            terminalCmd.value = '';
            appendTerminal(`$ ${cmd}\n`);
            try {
                const output = await apiCall({ action: 'cmd', cmd });
                appendTerminal(output + '\n');
            } catch (e) {
                appendTerminal(`Error: ${e.message}\n`);
            }
        });

        terminalCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') terminalExec.click();
        });

        quickCmds.forEach(btn => {
            btn.addEventListener('click', () => {
                terminalCmd.value = btn.textContent;
                terminalExec.click();
            });
        });

        // ====== FILE MANAGER ======
        function renderBreadcrumb(path) {
            const parts = path.split('/').filter(p => p);
            let html = '<span data-path="/">/</span>';
            let cumulative = '';
            parts.forEach((part, i) => {
                cumulative += '/' + part;
                html += `<span class="sep">/</span><span data-path="${cumulative}">${part}</span>`;
            });
            breadcrumb.innerHTML = html;
            breadcrumb.querySelectorAll('span[data-path]').forEach(span => {
                span.addEventListener('click', () => {
                    currentPath = span.dataset.path;
                    loadFileList(currentPath);
                });
            });
        }

        async function loadFileList(path) {
            try {
                const data = await apiCall({ action: 'list', path });
                currentPath = path;
                renderBreadcrumb(path);
                renderFileItems(data);
            } catch (e) {
                fileList.innerHTML = `<div style="padding:1rem;color:var(--danger);">Error: ${e.message}</div>`;
            }
        }

        function renderFileItems(items) {
            if (!items || items.length === 0) {
                fileList.innerHTML = '<div style="padding:1rem;">Empty directory</div>';
                return;
            }
            let html = '';
            items.forEach(item => {
                const isDir = item.type === 'dir' || item.type === 'directory';
                const icon = isDir ? '📁' : '📄';
                const name = item.name;
                const size = item.size !== undefined ? formatSize(item.size) : '';
                const itemPath = currentPath.replace(/\/+$/, '') + '/' + name;
                html += `
                <div class="file-item">
                    <div class="name" data-path="${escapeHtml(itemPath)}" data-dir="${isDir}">
                        <span class="file-icon">${icon}</span>
                        <span>${escapeHtml(name)}</span>
                        ${size ? `<span style="color:var(--text-secondary);font-size:0.8rem;">${size}</span>` : ''}
                    </div>
                    <div class="file-actions">
                        ${!isDir ? `<button class="file-act-btn edit" data-path="${escapeHtml(itemPath)}">✏️ Edit</button>
                        <button class="file-act-btn download" data-path="${escapeHtml(itemPath)}">⬇️ DL</button>` : ''}
                        <button class="file-act-btn delete" data-path="${escapeHtml(itemPath)}">🗑️</button>
                    </div>
                </div>`;
            });
            fileList.innerHTML = html;

            // Click on name to navigate if directory, or do nothing for files
            fileList.querySelectorAll('.name').forEach(el => {
                el.addEventListener('click', () => {
                    const path = el.dataset.path;
                    const isDir = el.dataset.dir === 'true';
                    if (isDir) {
                        currentPath = path;
                        loadFileList(path);
                    }
                });
            });

            // Edit button
            fileList.querySelectorAll('.file-act-btn.edit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const path = btn.dataset.path;
                    openInEditor(path);
                });
            });

            // Download button
            fileList.querySelectorAll('.file-act-btn.download').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const path = btn.dataset.path;
                    try {
                        const content = await apiCall({ action: 'read', path });
                        downloadFile(path.split('/').pop(), content);
                    } catch (err) {
                        alert('Download failed: ' + err.message);
                    }
                });
            });

            // Delete button
            fileList.querySelectorAll('.file-act-btn.delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const path = btn.dataset.path;
                    if (!confirm(`Delete ${path}?`)) return;
                    try {
                        await apiCall({ action: 'delete', path });
                        loadFileList(currentPath);
                    } catch (err) {
                        alert('Delete failed: ' + err.message);
                    }
                });
            });
        }

        function formatSize(bytes) {
            if (bytes === undefined || bytes === null) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            return String(text).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ====== UPLOAD ======
        selectFilesBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                uploadFiles(fileInput.files);
            }
        });

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                uploadFiles(e.dataTransfer.files);
            }
        });

        async function uploadFiles(files) {
            const destPath = uploadPath.value.replace(/\/+$/, '');
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('path', destPath);
                formData.append('password', AUTH_PASSWORD);
                formData.append('action', 'upload');
                try {
                    uploadStatus.textContent = `Uploading ${file.name}...`;
                    progressContainer.style.display = 'block';
                    progressBar.style.width = '0%';
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', BACKEND_URL);
                    xhr.upload.addEventListener('progress', (e) => {
                        if (e.lengthComputable) {
                            const percent = (e.loaded / e.total) * 100;
                            progressBar.style.width = percent + '%';
                        }
                    });
                    await new Promise((resolve, reject) => {
                        xhr.onload = () => {
                            if (xhr.status >= 200 && xhr.status < 300) resolve();
                            else reject(new Error(xhr.statusText));
                        };
                        xhr.onerror = () => reject(new Error('Network error'));
                        xhr.send(formData);
                    });
                    uploadStatus.textContent = `Uploaded ${file.name} successfully.`;
                    progressBar.style.width = '100%';
                } catch (err) {
                    uploadStatus.textContent = `Failed: ${file.name} - ${err.message}`;
                } finally {
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                    }, 1000);
                }
            }
        }

        // ====== EDITOR ======
        function openInEditor(path) {
            // Switch to editor tab
            document.querySelector('.tab[data-panel="editor"]').click();
            editorFilename.value = path;
            loadFileForEditing(path);
        }

        async function loadFileForEditing(path) {
            try {
                const content = await apiCall({ action: 'read', path });
                editorContent.value = content;
                editorStatus.textContent = 'Loaded.';
                editorStatus.style.color = 'var(--success)';
            } catch (e) {
                editorStatus.textContent = 'Load error: ' + e.message;
                editorStatus.style.color = 'var(--danger)';
            }
        }

        editorLoad.addEventListener('click', () => {
            const path = editorFilename.value.trim();
            if (!path) return;
            loadFileForEditing(path);
        });

        editorSave.addEventListener('click', async () => {
            const path = editorFilename.value.trim();
            const content = editorContent.value;
            if (!path) return;
            try {
                await apiCall({ action: 'write', path, content }, 'POST', null);
                editorStatus.textContent = 'Saved successfully.';
                editorStatus.style.color = 'var(--success)';
            } catch (e) {
                editorStatus.textContent = 'Save error: ' + e.message;
                editorStatus.style.color = 'var(--danger)';
            }
        });

        // ====== INIT ======
        passwordInput.focus();
        // Expose for debugging (optional)
    })();
    </script>
</body>
</html>
